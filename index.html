<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelo Zelatus - Scholastic Studies</title>
    <style>
        body {
            background-color: #331a20; 
            color: #e0d8c3; 
            font-family: "Book Antiqua", "Palatino Linotype", Palatino, serif;
            margin: 0;
            padding-top: 30px;
        }

        .outer-table {
            border: 4px ridge #6b4450;
            background-color: #331a20;
            width: 900px;
            padding: 15px;
            margin: 0 auto;
        }

        a {
            color: #d4a5a5;
            text-decoration: underline;
        }

        a:hover {
            color: #ffffff;
            background-color: #4a252f;
        }

        h1 {
            font-size: 36pt;
            font-weight: normal;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-align: center;
        }

        .content-cell {
            vertical-align: top;
            text-align: center;
            padding: 20px;
        }

        .image-cell {
            vertical-align: top;
            width: 360px;
            text-align: center;
        }

        .image-border {
            border: 3px double #e0d8c3;
            padding: 2px;
            background-color: #000;
        }

        .work-entry {
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .work-title {
            font-size: 16pt;
            display: block;
            margin-bottom: 5px;
        }

        .work-subtitle {
            font-size: 11pt;
            font-style: italic;
            display: block;
            color: #bfa8a8;
        }

        .author-name {
            font-size: 12pt;
            display: block;
            margin-top: 5px;
            color: #e0d8c3;
        }

        .section-title {
            font-size: 10pt;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-top: 10px;
            color: #d4a5a5;
        }

        hr {
            border: 0;
            border-top: 1px double #e0d8c3;
            height: 3px;
            margin: 20px 0;
        }

        footer {
            font-size: 10pt;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<center>
    <table class="outer-table" cellpadding="10" cellspacing="0">
        <tr>
            <td colspan="2">
                <h1>Zelo Zelatus</h1>
                <hr>
            </td>
        </tr>
        <tr>
            <!-- Main Content: List of Works -->
            <td class="content-cell">
                
                <div class="work-entry">
                    <a href="https://files.catbox.moe/ol4zd2.pdf" class="work-title">Draft Translation of the Compendio de Ascética y Mística (Third Edition)</a>
                    <span class="author-name">Fr. Crisógono de Jesús Sacramentado, O.C.D.</span>
                    <span class="section-title">First Part: Principles of the Supernatural Life</span>
                </div>

                <!-- Future entries can be added here -->

            </td>

            <!-- Image Column -->
            <td class="image-cell">
                <img src="https://files.catbox.moe/jem0ba.webp" width="340" class="image-border" alt="Manuscript Illustration">
            </td>
        </tr>
        <tr>
            <td colspan="2">
                <hr>
                <footer>
                    <font size="1">North Dakota, USA</font>
                </footer>
            </td>
        </tr>
    </table>
</center>

</body>
</html>
